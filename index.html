<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Helper Bees — Protected</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdf8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    p {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 28px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }

    input[type="password"]:focus {
      border-color: #f4a32a;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f4a32a;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #e09220; }

    .error {
      display: none;
      color: #d0021b;
      font-size: 0.85rem;
      margin-top: 10px;
    }

    .links {
      display: none;
      margin-top: 24px;
      text-align: left;
    }

    .links p {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }

    .links a {
      display: block;
      padding: 12px 16px;
      background: #fdf8f0;
      border: 1.5px solid #f4a32a;
      border-radius: 8px;
      color: #1a1a1a;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 10px;
      transition: background 0.2s;
    }

    .links a:hover { background: #fef0d6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐝</div>
    <h1>The Helper Bees</h1>
    <p>Enter your access code to continue.</p>

    <input type="password" id="code" placeholder="Access code" autocomplete="off" />
    <button onclick="verify()">Continue</button>
    <div class="error" id="error">Incorrect access code. Please try again.</div>

    <div class="links" id="links">
      <p>Select a document to view:</p>
      <a href="partner-care-journey.html">Partner Care Journey</a>
      <a href="partner-care-journey-thb.html">Partner Care Journey — THB</a>
      <a href="user-testing-strategy-tldr.docx" download>User Testing Strategy (TL;DR)</a>
      <a href="user-testing-strategy.docx" download>User Testing Strategy</a>
    </div>
  </div>

  <script>
    // SHA-256 hash of the access code — the actual code is never stored here
    const HASH = 'b981461f8a9adeb220fb1bcec4789c7182bcb800e0e7b777f88c8495cb943556';

    document.getElementById('code').addEventListener('keydown', e => {
      if (e.key === 'Enter') verify();
    });

    async function verify() {
      const input = document.getElementById('code').value;
      const encoded = new TextEncoder().encode(input);
      const buffer = await crypto.subtle.digest('SHA-256', encoded);
      const hash = Array.from(new Uint8Array(buffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');

      if (hash === HASH) {
        document.getElementById('error').style.display = 'none';
        document.getElementById('links').style.display = 'block';
        document.getElementById('code').style.display = 'none';
        document.querySelector('button').style.display = 'none';
        document.querySelector('p').textContent = 'Access granted. Select a document below.';
      } else {
        document.getElementById('error').style.display = 'block';
        document.getElementById('code').value = '';
        document.getElementById('code').focus();
      }
    }
  </script>
</body>
</html>
